name: no-hosted-runners-guard

# Strict rule (2026-05-04): all workflows in this repo must use self-hosted
# runners only. This guard rejects any change that introduces a GitHub-hosted
# runner (ubuntu-*, macos-*, windows-*) UNLESS the runs-on line is preceded
# immediately by a "# ALLOWED-HOSTED: <reason>" justification comment.
#
# Runs on self-hosted; if no runner is registered for this repo the job
# queues and merging via branch protection is blocked, which is desired —
# the repo either gets a runner registered or the offending workflow removed.

on:
  push:
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'

concurrency:
  group: no-hosted-runners-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Reject unjustified hosted runners in workflow files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          bad=0
          pat='^[[:space:]]*runs-on:[[:space:]]*\[?[[:space:]]*"?(ubuntu-(latest|[0-9.]+(-arm)?)|macos-(latest|[0-9]+)|windows-(latest|[0-9]+))"?'
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ "$(basename "$f")" = "no-hosted-runners.yml" ] && continue
            # awk: emit only runs-on lines NOT preceded by ALLOWED-HOSTED on the prior line
            violations=$(awk -v file="$f" -v pat="$pat" '
              {
                if ($0 ~ pat) {
                  if (prev !~ /ALLOWED-HOSTED/) {
                    printf "%s:%d: %s\n", file, NR, $0
                  }
                }
                prev = $0
              }
            ' "$f")
            if [ -n "$violations" ]; then
              echo "::error file=$f::GitHub-hosted runner without # ALLOWED-HOSTED: justification"
              echo "$violations"
              bad=1
            fi
          done
          if [ $bad -ne 0 ]; then
            echo ""
            echo "Strict rule: runs-on values must be self-hosted, OR have a"
            echo "  # ALLOWED-HOSTED: <reason>"
            echo "comment immediately above the runs-on line."
            echo "See feedback_self_hosted_runners_only.md."
            exit 1
          fi
          echo "OK — no unjustified GitHub-hosted runners detected."
